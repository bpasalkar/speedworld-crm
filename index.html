<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedworld - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <div class="logo-placeholder">SL</div>
            <div class="brand-info">
                <h1>SPEEDWORLD</h1>
                <span>Fast. Reliable. Unlimited.</span>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="card account-info-card">
            <div class="user-meta">
                <span class="member-since">Member since: Jan 2024</span>
                <span class="status-indicator">● Connected</span>
            </div>
            
            <h2 id="user-name">Rajesh Kumar</h2>
            <p class="user-id">ID: SW-1052</p>

            <div class="plan-details">
                <div class="detail-item">
                    <label>Current Plan</label>
                    <strong id="plan-name">500 Mbps Business</strong>
                </div>
                <div class="detail-item text-right">
                    <label>Expires In</label>
                    <strong id="expiry-days">14 Days</strong>
                </div>
            </div>

            <div id="dues-section" class="dues-box">
                <span>Outstanding Dues: <strong id="due-amount">₹599</strong></span>
                <button class="btn-pay-now" onclick="switchTab('account-view')">Pay Now</button>
            </div>

            <a href="#" class="renew-link" onclick="handleRenewal()">Renew Now</a>
        </section>

        <h4 class="section-label">Quick Actions</h4>
        <div class="action-list">
            <button class="action-btn" onclick="handleRenewal()">
                <i class="fas fa-sync-alt"></i> Renew / Change Plan
            </button>
            <button class="action-btn" onclick="switchTab('account-view')">
                <i class="fas fa-file-invoice-dollar"></i> Pay Bill
            </button>
            <button class="action-btn" onclick="switchTab('support-view')">
                <i class="fas fa-exclamation-circle"></i> Raise a Complaint
            </button>
        </div>

        <h4 class="section-label">More Options</h4>
        <div class="more-links">
            <a href="#">Payment History</a>
            <a href="#">Plan History</a>
            <a href="#">Account Details</a>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item"><i class="fas fa-rocket"></i><span>Plans</span></div>
        <div class="nav-item"><i class="fas fa-headset"></i><span>Support</span></div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
