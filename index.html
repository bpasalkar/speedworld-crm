<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedworld CRM - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #004a7c; --teal: #008080; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--blue); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid var(--teal); margin-bottom: 20px; }
        .data-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .label { font-weight: bold; color: #666; }
        .value { color: var(--blue); font-weight: bold; }
        .balance-red { color: #d32f2f; font-size: 1.2em; font-weight: bold;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #eee; text-align: left; padding: 10px; color: #666; font-size: 0.85em; text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 0.9em; }
        
        /* Status Badge Colors */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .open { background: #fff3e0; color: #ef6c00; } /* Orange for Open */
        .progress { background: #e3f2fd; color: #1565c0; } /* Blue for In Progress */
        .closed { background: #e8f5e9; color: #2e7d32; } /* Green for Closed */

        button:hover { opacity: 0.9; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Speedworld Admin Panel</h2>
        <div id="status-tag">Live Database</div>
    </div>

    <div id="main-content">
        <div class="card">
            <h3>Customer Overview</h3>
            <div class="data-row"><span class="label">Name:</span> <span class="value" id="name">Loading...</span></div>
            <div class="data-row"><span class="label">User ID:</span> <span class="value" id="uid"></span></div>
            <div class="data-row"><span class="label">Plan:</span> <span class="value" id="plan"></span></div>
            <div class="data-row" style="border:none;"><span class="label">Amount Due:</span> <span class="balance-red" id="balance"></span></div>
        </div>

        <div class="card">
            <h3>Recent Payments</h3>
            <table>
                <thead><tr><th>Date</th><th>Amount</th><th>Method</th></tr></thead>
                <tbody id="payment-list"></tbody>
            </table>
        </div>

        <div class="card">
            <h3>Your Tickets</h3>
            <table>
                <thead><tr><th>ID</th><th>Category</th><th>Status</th></tr></thead>
                <tbody id="ticket-list"></tbody>
            </table>
        </div>

        <div class="card">
            <h3>Raise a Complaint</h3>
            <form id="complaint-form">
                <select id="category" style="width: 100%; padding: 10px; margin-bottom: 10px;" required>
                    <option value="">Select Category</option>
                    <option value="No Internet">No Internet</option>
                    <option value="Slow Speed">Slow Speed</option>
                    <option value="Billing">Billing Issue</option>
                </select>
                <textarea id="description" rows="3" style="width: 100%; padding: 10px; box-sizing: border-box;" placeholder="Describe issue..." required></textarea>
                <button type="submit" id="submit-btn" style="background: var(--blue); color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; margin-top: 10px; font-weight: bold;">Submit Complaint</button>
            </form>
            <div id="form-feedback" style="margin-top: 10px; text-align: center;"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://xornzelybefhpcpfrmhl.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_UZD-UWg94FObGgah7XbyUA_64-1uj9M';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadDashboard() {
        const { data: user } = await _supabase.from('customers').select('*').limit(1).single();
        if (user) {
            document.getElementById('name').innerText = user.full_name;
            document.getElementById('uid').innerText = user.user_id;
            document.getElementById('plan').innerText = user.current_plan;
            document.getElementById('balance').innerText = "₹" + user.current_balance;

            // Load Payments
            const { data: pays } = await _supabase.from('payments').select('*').eq('customer_id', user.user_id);
            document.getElementById('payment-list').innerHTML = pays.map(p => 
                `<tr><td>${p.payment_date}</td><td>₹${p.amount_paid}</td><td>${p.pay_method}</td></tr>`).join('');

            // Load Tickets
            refreshTickets(user.user_id);
        }
    }

    async function refreshTickets(uid) {
        const { data: tickets } = await _supabase.from('tickets').select('*').eq('customer_id', uid);
        document.getElementById('ticket-list').innerHTML = tickets.map(t => {
            let s = t.ticket_status.toLowerCase().replace(" ", "");
            return `<tr><td>${t.ticket_number}</td><td>${t.category}</td><td><span class="badge ${s}">${t.ticket_status}</span></td></tr>`;
        }).join('');
    }

    document.getElementById('complaint-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const uid = document.getElementById('uid').innerText;
        const { error } = await _supabase.from('tickets').insert([{ 
            ticket_number: "CR-" + Math.floor(Math.random()*9000),
            customer_id: uid,
            category: document.getElementById('category').value,
            problem_desc: document.getElementById('description').value,
            ticket_status: 'Open'
        }]);
        if (!error) {
            document.getElementById('form-feedback').innerText = "Ticket Added!";
            document.getElementById('complaint-form').reset();
            refreshTickets(uid); // Update list immediately!
        }
    });

    loadDashboard();
</script>
</body>
</html>
