<header class="app-header">
    <div class="logo">SPEEDWORLD</div>
    <div class="user-profile"><i class="fas fa-circle-user fa-xl"></i></div>
</header>

<main class="container">
    <div id="home-tab" class="tab-content active">
        <div class="notice-bar">
            <i class="fas fa-triangle-exclamation"></i>
            <marquee>Limited Time: Get 1 Month Free on Yearly Subscriptions! | New OTT Bundle with Disney+ Hotstar is live.</marquee>
        </div>

        <div class="promo-slider">
            <div class="promo-card grad-1">
                <h3>Refer & Earn</h3>
                <p>₹500 for you, ₹500 for them!</p>
            </div>
            <div class="promo-card grad-2">
                <h3>OTT Dhamaka</h3>
                <p>12+ Apps with Fiber Pro</p>
            </div>
        </div>

        <div class="service-grid">
            <div class="service-item" onclick="switchTab('account-tab')"><i class="fas fa-receipt"></i>Pay</div>
            <div class="service-item" onclick="switchTab('plans-tab')"><i class="fas fa-rocket"></i>Plans</div>
            <div class="service-item" onclick="api.openWhatsApp()"><i class="fab fa-whatsapp"></i>Chat</div>
            <div class="service-item" onclick="toggleDrawer('inq-drawer')"><i class="fas fa-plus"></i>New</div>
        </div>
    </div>
</main>

<nav class="bottom-nav">
    <div class="nav-btn active" onclick="switchTab('home-tab', this)">
        <i class="fas fa-house"></i><span>Home</span>
    </div>
    <div class="nav-btn" onclick="switchTab('plans-tab', this)">
        <i class="fas fa-list-check"></i><span>Plans</span>
    </div>
    <div class="nav-btn" onclick="switchTab('account-tab', this)">
        <i class="fas fa-user-astronaut"></i><span>Account</span>
    </div>
</nav>
