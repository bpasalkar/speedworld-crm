<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedworld Pro CRM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <h2 id="brand">Speedworld</h2>
        <p id="user-welcome">Authenticating...</p>
    </header>

    <main class="container">
        <section class="card border-teal">
            <div class="flex-row">
                <h3 id="plan-name">Loading...</h3>
                <span class="status-pill">Active</span>
            </div>
            <div class="usage-meter">
                <div id="validity-bar" class="fill"></div>
            </div>
            <div class="flex-row sub-text">
                <span>Account Status: Online</span>
                <span id="expiry-date">---</span>
            </div>
            <div class="billing-zone">
                <label>Amount Due</label>
                <h1 id="balance-display">₹0</h1>
                <button id="pay-btn" class="btn-primary hidden" onclick="handlePayment()">PAY NOW</button>
            </div>
        </section>

        <nav class="action-grid">
            <button class="action-item" onclick="toggleDrawer('complaint-drawer')">
                <i class="fas fa-headset"></i><span>Support</span>
            </button>
            <button class="action-item" onclick="toggleDrawer('upgrade-drawer')">
                <i class="fas fa-rocket"></i><span>Upgrade</span>
            </button>
            <button class="action-item" onclick="api.requestCashCollection()">
                <i class="fas fa-motorcycle"></i><span>Cash Pick</span>
            </button>
            <button class="action-item whatsapp" onclick="api.openWhatsApp()">
                <i class="fab fa-whatsapp"></i><span>WhatsApp</span>
            </button>
        </nav>

        <div id="complaint-drawer" class="card drawer hidden">
            <h4>New Complaint</h4>
            <select id="ticket-category">
                <option value="No Internet">No Internet</option>
                <option value="Slow Speed">Slow Speed</option>
                <option value="Billing Issue">Billing Issue</option>
            </select>
            <textarea id="ticket-desc" placeholder="Details..."></textarea>
            <button class="btn-block" onclick="api.submitTicket()">Submit</button>
        </div>

        <div id="upgrade-drawer" class="card drawer hidden">
            <h4>Upgrade Plan</h4>
            <select id="new-plan-id">
                <option value="100 Mbps Unlimited">100 Mbps - ₹699</option>
                <option value="200 Mbps Premium">200 Mbps - ₹999</option>
                <option value="500 Mbps Business">500 Mbps - ₹1499</option>
            </select>
            <button class="btn-block" onclick="api.upgradePlan()">Confirm</button>
        </div>

        <section class="card">
            <h4><i class="fas fa-history"></i> Recent Payments</h4>
            <div id="payment-list" class="list-container"></div>
        </section>

        <section class="card">
            <h4><i class="fas fa-ticket-alt"></i> Active Tickets</h4>
            <div id="ticket-list" class="list-container"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
